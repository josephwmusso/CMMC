  notes: null
- id: m1_q01
  module: 1
  module_name: Access Control
  section: account_management
  prompt: How are user accounts created and approved for systems that store or process CUI?
  type: single_choice
  allowed_values:
  - formal_process
  - manager_email
  - it_creates_as_needed
  - self_service
  required: true
  controls:
  - AC.L2-3.1.1
  allows_free_text: false
  free_text_prompt: null
  depends_on: null
  weight: null
  help_text: NIST 800-171 requires that only authorized users, processes, and devices have access to CUI systems. Assessors
    will look for documented account provisioning procedures and approval records.
  notes: 'branching keys: [''self_service'']'
- id: m1_q02
  module: 1
  module_name: Access Control
  section: account_management
  prompt: How often are user accounts reviewed to verify they are still needed?
  type: single_choice
  allowed_values:
  - quarterly
  - semiannual
  - annual
  - no_review
  required: true
  controls:
  - AC.L2-3.1.1
  allows_free_text: false
  free_text_prompt: null
  depends_on: null
  weight: null
  help_text: Regular access reviews ensure terminated or transferred employees no longer have access. Assessors expect documented
    evidence of periodic reviews with sign-off.
  notes: null
- id: m1_q03
  module: 1
  module_name: Access Control
  section: account_management
  prompt: What happens to a user's account when they leave the company or change roles?
  type: single_choice
  allowed_values:
  - same_day_disable
  - within_week
  - eventually
  - no_process
  required: true
  controls:
  - AC.L2-3.1.1
  - AC.L2-3.1.2
  allows_free_text: false
  free_text_prompt: null
  depends_on: null
  weight: null
  help_text: Timely account deprovisioning is one of the most commonly failed controls in CMMC assessments. Assessors will
    ask to see offboarding records for recent departures.
  notes: 'branching keys: [''no_process'']'
- id: m1_q04
  module: 1
  module_name: Access Control
  section: account_management
  prompt: How do you control what each user can do on CUI systems (role-based access, permissions)?
  type: single_choice
  allowed_values:
  - rbac_enforced
  - ad_groups
  - per_user_manual
  - everyone_admin
  required: true
  controls:
  - AC.L2-3.1.2
  allows_free_text: false
  free_text_prompt: null
  depends_on: null
  weight: null
  help_text: Assessors verify that users can only perform transactions and functions they are specifically authorized for.
    RBAC through your identity provider is the cleanest evidence.
  notes: 'branching keys: [''everyone_admin'']'
- id: m1_q05
  module: 1
  module_name: Access Control
  section: account_management
  prompt: Are duties separated so that no single person can perform all critical steps of a sensitive process (e.g., the person
    who approves access is different from the person who provisions it)?
  type: single_choice
  allowed_values:
  - yes_documented
  - yes_informal
  - partial
  - no_separation
  required: true
  controls:
  - AC.L2-3.1.4
  allows_free_text: false
  free_text_prompt: null
  depends_on: null
  weight: null
  help_text: For a small company, perfect separation of duties is challenging. The key is documenting which duties are separated
    and where compensating controls (like audit logging) are used. This is a 1-point control.
  notes: null
- id: m1_q06
  module: 1
  module_name: Access Control
  section: account_management
  prompt: How are privileged accounts (domain admin, root, system admin) managed?
  type: multi_choice
  allowed_values:
  - named_admins
  - pam_tool
  - limited_admins
  - shared_admin
  required: true
  controls:
  - AC.L2-3.1.5
  allows_free_text: false
  free_text_prompt: null
  depends_on: null
  weight: null
  help_text: Least privilege means privileged access is only granted when necessary and individually attributable. Assessors
    will ask who has admin access and how it is tracked.
  notes: 'branching keys: [''shared_admin'']'
- id: m1_q07
  module: 1
  module_name: Access Control
  section: account_management
  prompt: Do administrators use separate non-privileged accounts for daily tasks like email, web browsing, and document editing?
  type: single_choice
  allowed_values:
  - yes_separate
  - yes_but_inconsistent
  - no_same_account
  required: true
  controls:
  - AC.L2-3.1.6
  allows_free_text: false
  free_text_prompt: null
  depends_on: null
  weight: null
  help_text: Using admin accounts for email and web browsing dramatically increases attack surface. Assessors specifically
    check whether admin accounts are used for non-security functions.
  notes: null
- id: m1_q08
  module: 1
  module_name: Access Control
  section: account_management
  prompt: Can standard (non-admin) users install software, change system settings, or disable security tools?
  type: single_choice
  allowed_values:
  - no_prevented
  - partially_restricted
  - yes_local_admin
  required: true
  controls:
  - AC.L2-3.1.7
  allows_free_text: false
  free_text_prompt: null
  depends_on: null
  weight: null
  help_text: Standard users must not be able to execute privileged functions. When they attempt to, the system should deny
    the action and log the attempt. Local admin rights on CUI endpoints is a common audit failure.
  notes: 'branching keys: [''yes_local_admin'']'
- id: m1_q09
  module: 1
  module_name: Access Control
  section: login_session
  prompt: What happens after multiple failed login attempts?
  type: single_choice
  allowed_values:
  - lockout_configured
  - increasing_delay
  - alert_only
  - nothing
  required: true
  controls:
  - AC.L2-3.1.8
  allows_free_text: false
  free_text_prompt: null
  depends_on: null
  weight: null
  help_text: 'Account lockout policies are directly testable by assessors. Common settings: 3-5 attempts, 15-30 minute lockout.
    This applies to all CUI system authentication points.'
  notes: null
- id: m1_q10
  module: 1
  module_name: Access Control
  section: login_session
  prompt: Where is the account lockout policy enforced?
  type: multi_choice
  allowed_values:
  - domain_gpo
  - vpn_gateway
  - local_workstation
  - cloud_apps
  required: true
  controls:
  - AC.L2-3.1.8
  allows_free_text: false
  free_text_prompt: null
  depends_on: null
  weight: null
  help_text: Lockout policy must be enforced at every authentication point for CUI systems. Assessors may test multiple entry
    points — don't forget VPN, cloud apps, and local logon.
  notes: null
- id: m1_q11
  module: 1
  module_name: Access Control
  section: login_session
  prompt: Do CUI systems display a login banner or notice before granting access?
  type: single_choice
  allowed_values:
  - yes_banner
  - generic_banner
  - no_banner
  required: true
  controls:
  - AC.L2-3.1.9
  allows_free_text: false
  free_text_prompt: null
  depends_on: null
  weight: null
  help_text: The banner must notify users that the system processes CUI, that usage may be monitored, and that unauthorized
    use is prohibited. This is a 1-point control but easy to implement and commonly checked.
  notes: null
- id: m1_q12
  module: 1
  module_name: Access Control
  section: login_session
  prompt: Do CUI workstations and systems lock after a period of inactivity?
  type: single_choice
  allowed_values:
  - yes_15_or_less
  - yes_longer
  - user_discretion
  - no_session_lock
  required: true
  controls:
  - AC.L2-3.1.10
  allows_free_text: false
  free_text_prompt: null
  depends_on: null
  weight: null
  help_text: Session lock must activate automatically after inactivity AND hide screen content (screensaver or lock screen).
    15 minutes is the typical threshold. Enforced via GPO or MDM, not user configuration.
  notes: null
- id: m1_q13
  module: 1
  module_name: Access Control
  section: login_session
  prompt: Are user sessions automatically terminated after a defined condition (e.g., end of business day, extended inactivity,
    or connection timeout)?
  type: single_choice
  allowed_values:
  - yes_policy_enforced
  - vpn_timeout_only
  - no_termination
  required: true
  controls:
  - AC.L2-3.1.11
  allows_free_text: false
  free_text_prompt: null
  depends_on: null
  weight: null
  help_text: This is different from session lock (3.1.10). Session termination actually ends the session, requiring re-authentication.
    Think VPN timeouts, RDP disconnects, and idle web session expiry.
  notes: null
- id: m1_q14
  module: 1
  module_name: Access Control
  section: remote_access
  prompt: How do remote workers connect to internal systems that store or process CUI?
  type: single_choice
  allowed_values:
  - vpn_always_on
  - vpn_manual
  - vpn_no_mfa
  - rdp_direct
  - no_remote
  required: true
  controls:
  - AC.L2-3.1.12
  - AC.L2-3.1.14
  allows_free_text: false
  free_text_prompt: null
  depends_on: null
  weight: null
  help_text: NIST 800-171 requires all remote access sessions to be monitored, controlled, encrypted, and routed through managed
    access control points. A VPN concentrator with MFA is the standard approach.
  notes: 'branching keys: [''vpn_no_mfa'', ''rdp_direct'', ''no_remote'']'
- id: m1_q15
  module: 1
  module_name: Access Control
  section: remote_access
  prompt: How is remote access activity monitored?
  type: multi_choice
  allowed_values:
  - vpn_logs_siem
  - vpn_logs_reviewed
  - connection_alerts
  - no_monitoring
  required: true
  controls:
  - AC.L2-3.1.12
  allows_free_text: false
  free_text_prompt: null
  depends_on: null
  weight: null
  help_text: Monitoring means more than just having logs exist. Assessors want to see that remote access events are reviewed
    and that anomalies would be detected.
  notes: null
- id: m1_q16
  module: 1
  module_name: Access Control
  section: remote_access
  prompt: What encryption is used for remote access sessions?
  type: single_choice
  allowed_values:
  - fips_validated
  - strong_crypto
  - unknown
  - weak_or_none
  required: true
  controls:
  - AC.L2-3.1.13
  allows_free_text: false
  free_text_prompt: null
  depends_on: null
  weight: null
  help_text: Remote access sessions must use cryptographic mechanisms to protect confidentiality. FIPS-validated crypto is
    ideal for CMMC but strong encryption (TLS 1.2+, AES-256) meets the minimum bar. Assessors may verify VPN configuration
    directly.
  notes: null
- id: m1_q17
  module: 1
  module_name: Access Control
  section: remote_access
  prompt: How many remote access entry points exist (VPN concentrators, remote desktop gateways, web portals)?
  type: single_choice
  allowed_values:
  - single_point
  - few_managed
  - multiple_unmanaged
  - unknown
  required: true
  controls:
  - AC.L2-3.1.14
  allows_free_text: false
  free_text_prompt: null
  depends_on: null
  weight: null
  help_text: All remote access must be routed through a limited number of managed access control points. Shadow IT remote
    access tools (TeamViewer, AnyDesk) that bypass the VPN are a common finding.
  notes: null
- id: m1_q18
  module: 1
  module_name: Access Control
  section: remote_access
  prompt: Can administrators perform privileged actions (server administration, firewall changes, domain admin tasks) remotely?
  type: single_choice
  allowed_values:
  - yes_authorized_documented
  - yes_vpn_only
  - yes_unrestricted
  - no_onsite_only
  required: true
  controls:
  - AC.L2-3.1.15
  allows_free_text: false
  free_text_prompt: null
  depends_on: null
  weight: null
  help_text: Remote execution of privileged commands and access to security-relevant information must be explicitly authorized.
    The authorization should document who, what systems, and what actions are permitted.
  notes: null
- id: m1_q19
  module: 1
  module_name: Access Control
  section: wireless_mobile
  prompt: Does your office environment have wireless (Wi-Fi) networks?
  type: single_choice
  allowed_values:
  - yes_managed
  - yes_wpa2_psk
  - yes_open_or_weak
  - no_wireless
  required: true
  controls:
  - AC.L2-3.1.16
  - AC.L2-3.1.17
  allows_free_text: false
  free_text_prompt: null
  depends_on: null
  weight: null
  help_text: Wireless access must be authorized before allowing connections (3.1.16) and protected using authentication and
    encryption (3.1.17). WPA2-Enterprise with RADIUS/802.1X is the gold standard.
  notes: 'branching keys: [''no_wireless'', ''yes_open_or_weak'']'
- id: m1_q20
  module: 1
  module_name: Access Control
  section: wireless_mobile
  prompt: Is the wireless network segmented from the CUI network?
  type: single_choice
  allowed_values:
  - yes_segmented
  - yes_guest_separate
  - no_flat_network
  required: true
  controls:
  - AC.L2-3.1.16
  allows_free_text: false
  free_text_prompt: null
  depends_on: null
  weight: null
  help_text: Even with strong wireless encryption, network segmentation limits what wireless clients can reach. If CUI systems
    are on the same flat network as Wi-Fi, a compromised wireless device has direct access.
  notes: null
- id: m1_q21
  module: 1
  module_name: Access Control
  section: wireless_mobile
  prompt: How do you detect and handle unauthorized wireless access points (rogue APs)?
  type: single_choice
  allowed_values:
  - wids_active
  - periodic_scan
  - no_detection
  required: true
  controls:
  - AC.L2-3.1.16
  - AC.L2-3.1.17
  allows_free_text: false
  free_text_prompt: null
  depends_on: null
  weight: null
  help_text: Unauthorized access points can bypass network security. Most enterprise wireless controllers include rogue AP
    detection. For smaller environments, periodic scanning with a tool like NetSpot or Kismet demonstrates due diligence.
  notes: null
- id: m1_q22
  module: 1
  module_name: Access Control
  section: wireless_mobile
