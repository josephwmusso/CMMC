baselines:
- baseline_id: a109d505e4d2c7921a2e
  name: CIS Microsoft Windows 11 Enterprise Benchmark L1 v3.0
  items:
  - cis_id: 1.1.1
    title: Enforce password history
    section: Account Policies > Password Policy
    expected_value: 24 or more passwords remembered
    severity: MEDIUM
    control_ids:
    - IA.L2-3.5.7
    match_keywords:
    - password history
    - password policy
    match_plugin_families:
    - Windows
    - Policy Compliance
    match_plugin_ids:
    - '63063'
  - cis_id: 1.1.2
    title: Maximum password age
    section: Account Policies > Password Policy
    expected_value: 365 or fewer days
    severity: MEDIUM
    control_ids:
    - IA.L2-3.5.8
    match_keywords:
    - password age
    - password expir
    match_plugin_families:
    - Windows
    - Policy Compliance
    match_plugin_ids:
    - '63064'
