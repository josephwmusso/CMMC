services:
  - type: web
    name: cmmc-platform
    runtime: python
    buildCommand: pip install -r requirements.txt && cd frontend && npm install && npm run build
    startCommand: python scripts/render_startup.py
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: cmmc-db
          property: connectionURI
      - key: QDRANT_URL
        value: ""
      - key: LLM_PROVIDER
        value: "anthropic"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: NODE_VERSION
        value: "20"

databases:
  - name: cmmc-db
    plan: free
    databaseName: cmmc
    user: cmmc
