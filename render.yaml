services:
  - type: web
    name: cmmc-platform-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: bash scripts/render_startup.sh
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: cmmc-db
          property: connectionURI
      - key: QDRANT_URL
        value: ""
      - key: LLM_PROVIDER
        value: "anthropic"
      - key: PYTHON_VERSION
        value: "3.11.0"

  - type: web
    name: cmmc-platform-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://cmmc-platform-api.onrender.com/api/*
      - type: rewrite
        source: /health
        destination: https://cmmc-platform-api.onrender.com/health
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: cmmc-db
    plan: free
    databaseName: cmmc
    user: cmmc
